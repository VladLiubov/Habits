<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Habits Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    header h1 { font-size: 2rem; font-weight: 700; color: #1a202c; }
    header p.date { margin-top: 6px; font-size: 1rem; color: #718096; }

    /* Lang switcher */
    .lang-switcher {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      display: flex; gap: 4px;
    }
    .lang-btn {
      background: #e2e8f0; border: none; border-radius: 7px; padding: 5px 9px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; color: #718096;
      transition: all 0.15s;
    }
    .lang-btn:hover { background: #cbd5e0; }
    .lang-btn.active { background: #667eea; color: #fff; }

    /* Header action buttons */
    .header-actions {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      display: flex; gap: 6px;
    }
    .stats-btn {
      background: #667eea; color: #fff; border: none; border-radius: 10px;
      padding: 9px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: background 0.2s;
    }
    .stats-btn:hover { background: #5a67d8; }
    .stats-btn svg { flex-shrink: 0; }
    .trophy-btn { background: #ed8936; }
    .trophy-btn:hover { background: #dd6b20; }

    /* Day preview modal */
    .day-preview-date {
      font-size: 0.9rem; color: #718096; margin-bottom: 16px;
      padding-bottom: 14px; border-bottom: 1px solid #e2e8f0;
    }
    .preview-habit {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .preview-habit:last-child { border-bottom: none; }
    .preview-check {
      width: 22px; height: 22px; min-width: 22px; border-radius: 50%;
      border: 2px solid #cbd5e0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-check.done { background: #48bb78; border-color: #48bb78; }
    .preview-check.done::after { content: '✓'; color: #fff; font-size: 0.7rem; font-weight: 700; }
    .preview-habit-info { flex: 1; }
    .preview-habit-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .preview-habit-name.done { text-decoration: line-through; color: #a0aec0; }

    /* Tournament modal */
    .tournament-month-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .tournament-month-nav h3 { font-size: 1rem; font-weight: 700; }
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; margin-bottom: 24px; padding: 16px 0;
    }
    .podium-place {
      display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1;
    }
    .podium-avatar { font-size: 2rem; }
    .podium-name { font-weight: 700; font-size: 0.9rem; text-align: center; }
    .podium-pct { font-size: 0.8rem; color: #718096; }
    .podium-block {
      width: 100%; border-radius: 10px 10px 0 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: #fff; min-height: 40px;
    }
    .podium-place.first  .podium-block { background: #f6ad55; height: 90px; }
    .podium-place.second .podium-block { background: #a0aec0; height: 65px; }
    .podium-place.third  .podium-block { background: #b7791f; height: 45px; }
    .points-table {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px;
    }
    .points-row {
      display: flex; align-items: center; padding: 13px 16px; gap: 12px;
      border-bottom: 1px solid #f0f4f8;
    }
    .points-row:last-child { border-bottom: none; }
    .points-row.header { background: #f7fafc; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: #a0aec0; }
    .points-rank { width: 24px; text-align: center; font-weight: 700; }
    .points-user { flex: 1; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .points-val { font-weight: 700; color: #667eea; min-width: 40px; text-align: right; }

    .container { max-width: 600px; margin: 0 auto; }

    /* Add habit form */
    .add-habit-form { display: flex; gap: 10px; margin-bottom: 28px; }
    .add-habit-form input {
      flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0;
      border-radius: 10px; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s; background: #fff;
    }
    .add-habit-form input:focus { border-color: #667eea; }
    .add-habit-form button {
      padding: 12px 20px; background: #667eea; color: #fff; border: none;
      border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s; white-space: nowrap;
    }
    .add-habit-form button:hover { background: #5a67d8; }
    .add-habit-form button:disabled { opacity: 0.6; cursor: not-allowed; }

    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #a0aec0; margin-bottom: 12px;
    }

    /* Habits list */
    .habits-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .habit-item {
      display: flex; align-items: center; gap: 14px; background: #fff;
      border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }
    .habit-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .habit-item.done { opacity: 0.6; }
    .habit-item.done .habit-name { text-decoration: line-through; color: #a0aec0; }

    .habit-check {
      width: 24px; height: 24px; min-width: 24px; border-radius: 50%;
      border: 2px solid #cbd5e0; background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .habit-check.checked { background: #48bb78; border-color: #48bb78; }
    .habit-check svg { display: none; }
    .habit-check.checked svg { display: block; }

    .habit-name { flex: 1; font-size: 1rem; font-weight: 500; }
    .habit-delete {
      background: none; border: none; cursor: pointer; color: #cbd5e0;
      padding: 4px; border-radius: 6px; transition: color 0.2s; line-height: 0;
    }
    .habit-delete:hover { color: #fc8181; }

    /* Progress */
    .progress-section {
      background: #fff; border-radius: 14px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 28px;
    }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .progress-header span { font-size: 0.9rem; color: #718096; }
    .progress-header strong { font-size: 1rem; color: #2d3748; }
    .progress-bar-bg { height: 10px; background: #edf2f7; border-radius: 99px; overflow: hidden; }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #667eea, #48bb78);
      border-radius: 99px; transition: width 0.4s ease; width: 0%;
    }

    /* ── Calendar ────────────────────────────────────────────────── */
    .calendar-section {
      background: #fff; border-radius: 14px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 28px;
    }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .calendar-header h3 { font-size: 1rem; font-weight: 700; color: #2d3748; }
    .cal-nav {
      background: none; border: none; cursor: pointer; color: #667eea;
      font-size: 1.2rem; padding: 4px 8px; border-radius: 6px; line-height: 1;
      transition: background 0.15s;
    }
    .cal-nav:hover { background: #ebf4ff; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-day-name {
      text-align: center; font-size: 0.7rem; font-weight: 700;
      color: #a0aec0; letter-spacing: 0.05em; padding-bottom: 4px;
    }
    .cal-cell {
      aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: default;
      position: relative; transition: transform 0.1s; background: #f7fafc;
    }
    .cal-cell.has-data { cursor: pointer; }
    .cal-cell.has-data:hover { transform: scale(1.08); }
    .cal-cell.empty { background: transparent; }
    .cal-cell.future { background: #f7fafc; opacity: 0.45; }
    .cal-cell.pct-100  { background: #c6f6d5; }
    .cal-cell.pct-high { background: #fefcbf; }
    .cal-cell.pct-low  { background: #fed7d7; }
    .cal-cell.pct-zero { background: #edf2f7; }
    .cal-cell.today { outline: 2px solid #667eea; outline-offset: -2px; }
    .cal-num { font-size: 0.78rem; font-weight: 600; color: #4a5568; line-height: 1; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 3px; }
    .pct-100  .cal-dot { background: #38a169; }
    .pct-high .cal-dot { background: #d69e2e; }
    .pct-low  .cal-dot { background: #e53e3e; }
    .pct-zero .cal-dot { background: #a0aec0; }
    .cal-tooltip {
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%); background: #2d3748; color: #fff;
      font-size: 0.72rem; padding: 5px 8px; border-radius: 6px;
      white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity 0.15s; z-index: 10;
    }
    .cal-cell:hover .cal-tooltip { opacity: 1; }
    .cal-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; font-size: 0.75rem; color: #718096; }
    .cal-legend-item { display: flex; align-items: center; gap: 5px; }
    .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── User switcher ───────────────────────────────────────────── */
    .user-switcher {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 28px;
    }
    .user-btn {
      flex: 1; max-width: 160px; padding: 10px 16px; border: 2px solid #e2e8f0;
      border-radius: 12px; background: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; color: #718096; transition: all 0.15s; text-align: center;
    }
    .user-btn:hover { border-color: #667eea; color: #667eea; }
    .user-btn.active { background: #667eea; border-color: #667eea; color: #fff; }
    .user-btn .user-avatar {
      display: block; font-size: 1.4rem; line-height: 1; margin-bottom: 3px;
    }

    /* ── Detail Modal ───────────────────────────────────────────── */
    .detail-form { display: flex; flex-direction: column; gap: 16px; }
    .detail-habit-name {
      font-size: 1.1rem; font-weight: 700; color: #1a202c;
      padding-bottom: 14px; border-bottom: 1px solid #e2e8f0;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #718096;
    }
    .field-group input, .field-group textarea {
      padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; outline: none;
      transition: border-color 0.2s; background: #fff; color: #2d3748; resize: none;
    }
    .field-group input:focus, .field-group textarea:focus { border-color: #667eea; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field-group { flex: 1; }
    .detail-actions { display: flex; gap: 10px; padding-top: 4px; }
    .detail-save {
      flex: 1; padding: 13px; background: #48bb78; color: #fff; border: none;
      border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .detail-save:hover { background: #38a169; }
    .detail-skip {
      padding: 13px 18px; background: #e2e8f0; color: #4a5568; border: none;
      border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .detail-skip:hover { background: #cbd5e0; }

    /* Habit detail badge shown on habit card */
    .habit-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .habit-badge {
      font-size: 0.72rem; color: #718096; background: #edf2f7;
      border-radius: 6px; padding: 2px 7px; display: flex; align-items: center; gap: 3px;
    }

    /* ── Stats Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #f0f4f8; width: 100%; max-width: 600px;
      border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(40px); transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-top h2 { font-size: 1.25rem; font-weight: 700; color: #1a202c; }
    .modal-close {
      background: #e2e8f0; border: none; border-radius: 50%; width: 32px; height: 32px;
      cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
      justify-content: center; color: #4a5568; transition: background 0.15s;
    }
    .modal-close:hover { background: #cbd5e0; }

    /* Stat cards */
    .stat-cards {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: 14px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center;
    }
    .stat-card .stat-val {
      font-size: 1.8rem; font-weight: 800; color: #667eea; line-height: 1;
    }
    .stat-card .stat-label {
      font-size: 0.75rem; color: #718096; margin-top: 5px; font-weight: 500;
    }
    .stat-card.green .stat-val  { color: #38a169; }
    .stat-card.orange .stat-val { color: #dd6b20; }
    .stat-card.red .stat-val    { color: #e53e3e; }

    /* Chart containers */
    .chart-card {
      background: #fff; border-radius: 14px; padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px;
    }
    .chart-card h4 {
      font-size: 0.85rem; font-weight: 700; color: #4a5568;
      margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .chart-wrap { position: relative; height: 180px; }

    /* Modal loading */
    .modal-loading { text-align: center; padding: 40px 0; color: #a0aec0; }

    /* Empty state */
    .empty-state { text-align: center; padding: 32px 0; color: #a0aec0; font-size: 0.95rem; }
    .empty-state span { display: block; font-size: 2.5rem; margin-bottom: 10px; }

    /* Status notice */
    .db-notice {
      margin-top: 20px; padding: 12px 16px; border-radius: 10px;
      font-size: 0.82rem; text-align: center;
    }
    .db-notice.connected { background: #f0fff4; border: 1px dashed #68d391; color: #276749; }
    .db-notice.error     { background: #fff5f5; border: 1px dashed #fc8181; color: #c53030; }
    .db-notice.loading   { background: #ebf4ff; border: 1px dashed #90cdf4; color: #2b6cb0; }

    .list-loading { text-align: center; padding: 32px 0; color: #a0aec0; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ua">UA</button>
    </div>
    <h1 id="app-title">Daily Habits</h1>
    <p class="date" id="today-date"></p>
    <div class="header-actions">
      <button class="stats-btn" id="stats-open-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="8" width="3" height="7" rx="1" fill="currentColor"/>
          <rect x="6" y="4" width="3" height="11" rx="1" fill="currentColor"/>
          <rect x="11" y="1" width="3" height="14" rx="1" fill="currentColor"/>
        </svg>
        <span data-i18n="stats">Stats</span>
      </button>
      <button class="stats-btn trophy-btn" id="tournament-btn">🏆</button>
    </div>
  </header>

  <div class="user-switcher" id="user-switcher">
    <button class="user-btn active" data-user="me"><span class="user-avatar">🧑</span>Vlad</button>
    <button class="user-btn" data-user="sister"><span class="user-avatar">👧</span>Lena</button>
    <button class="user-btn" data-user="mother"><span class="user-avatar">👩</span>Nata</button>
  </div>

  <form class="add-habit-form" id="add-form">
    <input type="text" id="habit-input" placeholder="Add a new habit..." maxlength="80" autocomplete="off" />
    <button type="submit" id="add-btn" data-i18n="add">+ Add</button>
  </form>

  <p class="section-label" data-i18n="todaysHabits">Today's habits</p>
  <div class="habits-list" id="habits-list">
    <div class="list-loading" data-i18n="loading">Loading...</div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span data-i18n="progress">Progress</span>
      <strong id="progress-text">0 / 0</strong>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <p class="section-label" data-i18n="monthlyOverview">Monthly overview</p>
  <div class="calendar-section">
    <div class="calendar-header">
      <button class="cal-nav" id="cal-prev">&#8249;</button>
      <h3 id="cal-month-label"></h3>
      <button class="cal-nav" id="cal-next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#c6f6d5"></div> <span data-i18n="allDone">All done</span></div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fefcbf"></div> ≥ 50%</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fed7d7"></div> &lt; 50%</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#edf2f7"></div> <span data-i18n="noneDone">None done</span></div>
    </div>
  </div>

  <div class="db-notice loading" id="db-notice" data-i18n="connecting">Connecting to Supabase...</div>
</div>

<!-- ── Detail Modal ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-top">
      <h2 id="detail-modal-title">Log habit</h2>
      <button class="modal-close" id="detail-close-btn">&#x2715;</button>
    </div>
    <div class="detail-form" id="detail-form">
      <div class="detail-habit-name" id="detail-habit-name"></div>
      <div class="field-row">
        <div class="field-group">
          <label id="lbl-duration">Duration (min)</label>
          <input type="number" id="detail-duration" min="1" max="999" placeholder="e.g. 30" />
        </div>
        <div class="field-group">
          <label id="lbl-time">Time</label>
          <input type="time" id="detail-time" />
        </div>
      </div>
      <div class="field-group">
        <label id="lbl-note">Note (optional)</label>
        <textarea id="detail-note" rows="3" placeholder="What did you do?"></textarea>
      </div>
      <div class="detail-actions">
        <button class="detail-save" id="detail-save-btn">Mark as done</button>
        <button class="detail-skip" id="detail-skip-btn">Skip</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Stats Modal ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="stats-modal">
  <div class="modal">
    <div class="modal-top">
      <h2 data-i18n="yourStats">Your Statistics</h2>
      <button class="modal-close" id="stats-close-btn">&#x2715;</button>
    </div>
    <div id="stats-content">
      <div class="modal-loading" data-i18n="loadingStats">Loading stats...</div>
    </div>
  </div>
</div>

<!-- ── Day Preview Modal ────────────────────────────────────────────── -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <div class="modal-top">
      <h2 id="day-modal-title"></h2>
      <button class="modal-close" id="day-close-btn">&#x2715;</button>
    </div>
    <div class="day-preview-date" id="day-modal-date"></div>
    <div id="day-modal-content"></div>
  </div>
</div>

<!-- ── Tournament Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="tournament-modal">
  <div class="modal">
    <div class="modal-top">
      <h2 id="tournament-title">🏆 Tournament</h2>
      <button class="modal-close" id="tournament-close-btn">&#x2715;</button>
    </div>
    <div class="tournament-month-nav">
      <button class="cal-nav" id="trn-prev">&#8249;</button>
      <h3 id="trn-month-label"></h3>
      <button class="cal-nav" id="trn-next">&#8250;</button>
    </div>
    <div id="tournament-content"><div class="modal-loading">Loading...</div></div>
  </div>
</div>

  let currentLang = localStorage.getItem('lang') || 'en';

  function t(key) { return TRANSLATIONS[currentLang][key] || TRANSLATIONS.en[key] || key; }

  function applyLang() {
    document.getElementById('app-title').textContent = t('appTitle');
    document.getElementById('habit-input').placeholder = t('placeholder');
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (el.id !== 'db-notice' || el.classList.contains('loading')) {

    // Detail modal labels
    document.getElementById('detail-modal-title').textContent = t('logHabit');
    document.getElementById('detail-save-btn').textContent    = t('markDone');
    document.getElementById('detail-skip-btn').textContent    = t('skip');
    document.getElementById('lbl-duration').textContent       = t('duration');
    document.getElementById('lbl-time').textContent           = t('time');
    document.getElementById('lbl-note').textContent           = t('note');
    document.getElementById('detail-note').placeholder        = t('whatDidYouDo');

      btn.classList.toggle('active', btn.dataset.lang === currentLang);

  function setLang(lang) {

    btn.addEventListener('click', () => { if (btn.dataset.lang !== currentLang) setLang(btn.dataset.lang); });
  });

  // ─── Config ──────────────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://sxqclccivzebonipbtlj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cWNsY2NpdnplYm9uaXBidGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjAzNDIsImV4cCI6MjA4OTM5NjM0Mn0.v90Z1nbi6XQZ9IEjJNY6_xjV8TIAAl6EccR7o4lzaG8';

  // ─── Init ────────────────────────────────────────────────────────────────
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const TODAY = new Date().toISOString().slice(0, 10);

  // ─── Active user ─────────────────────────────────────────────────────────
  let currentUser = localStorage.getItem('active-user') || 'me';

  function setUser(user) {
    currentUser = user;
    localStorage.setItem('active-user', user);

      btn.classList.toggle('active', btn.dataset.user === user);

    const btn = e.target.closest('.user-btn');
    if (btn && btn.dataset.user !== currentUser) setUser(btn.dataset.user);

  const list         = document.getElementById('habits-list');
  const progressBar  = document.getElementById('progress-bar');
  const progressText = document.getElementById('progress-text');
  const dbNotice     = document.getElementById('db-notice');
  const addBtn       = document.getElementById('add-btn');

  function setNotice(msg, type) {
    dbNotice.textContent = msg;
    dbNotice.className = `db-notice ${type}`;
  }

  // ─── Data helpers ────────────────────────────────────────────────────────
  // '0001-01-01' is used as a sentinel date to store the static habit list (templates).
  // These rows are never shown as daily habits — they just define which habits exist.
  const TEMPLATE_DATE = '0001-01-01';

  async function fetchTemplates() {
    const { data, error } = await db
      .from('habits').select('*').eq('date', TEMPLATE_DATE).eq('user_name', currentUser)
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }

  async function fetchHabits() {
    const { data, error } = await db
      .from('habits').select('*').eq('date', TODAY).eq('user_name', currentUser)
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data;
  }

  async function fetchMonthHabits(year, month) {
    const from = `${year}-${String(month).padStart(2,'0')}-01`;
    const lastDay = new Date(year, month, 0).getDate();
    const to = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    const { data, error } = await db
      .from('habits').select('date, done').eq('user_name', currentUser)
      .gte('date', from).lte('date', to);
    if (error) throw error;
    return data;
  }

  async function fetchRangeHabits(from, to) {
    const { data, error } = await db
      .from('habits').select('date, done').eq('user_name', currentUser)
      .gte('date', from).lte('date', to);
    if (error) throw error;
    return data;
  }

  async function syncToday() {
    let templates = await fetchTemplates();

    // First-ever launch for this user: seed templates from most recent past day
    if (templates.length === 0) {
      const { data: latest } = await db
        .from('habits').select('date').eq('user_name', currentUser)
        .gt('date', TEMPLATE_DATE).lt('date', TODAY)
        .order('date', { ascending: false }).limit(1).single();
      if (latest) {
        const { data: prev } = await db
          .from('habits').select('name, created_at').eq('user_name', currentUser)
          .eq('date', latest.date).order('created_at', { ascending: true });
        if (prev && prev.length > 0) {
          await db.from('habits').insert(prev.map(h => ({ name: h.name, done: false, date: TEMPLATE_DATE, user_name: currentUser })));
          templates = await fetchTemplates();
        }
      }
    }

    if (templates.length === 0) return;

    const { data: todayRows } = await db.from('habits').select('name').eq('date', TODAY).eq('user_name', currentUser);
    const todayNames = new Set((todayRows || []).map(h => h.name));
    const missing = templates.filter(t => !todayNames.has(t.name));
    if (missing.length > 0) {
      await db.from('habits').insert(missing.map(t => ({ name: t.name, done: false, date: TODAY, user_name: currentUser })));
    }
  }

  async function addHabit(name) {
    await db.from('habits').insert({ name, done: false, date: TEMPLATE_DATE, user_name: currentUser });
    const { data, error } = await db
      .from('habits').insert({ name, done: false, date: TODAY, user_name: currentUser }).select().single();
    if (error) throw error;
    return data;
  }

  async function toggleHabit(id, done, extra = {}) {
    const { error } = await db.from('habits').update({ done, ...extra }).eq('id', id);
    if (error) throw error;
  }

  // ─── Detail Modal ────────────────────────────────────────────────────────
  let detailHabitId = null;

  function openDetailModal(id, name, currentDone) {
    // Only show detail form when marking as DONE
    if (currentDone) {
      // Already done → just uncheck directly
      toggleHabit(id, false, { duration_minutes: null, completed_time: null, note: null })
        .then(() => reload()).catch(err => setNotice(err.message, 'error'));
      return;
    }

    detailHabitId = id;
    document.getElementById('detail-habit-name').textContent = name;
    document.getElementById('detail-duration').value = '';
    document.getElementById('detail-note').value = '';
    // Pre-fill time with current time
    const now = new Date();
    document.getElementById('detail-time').value =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('detail-modal').classList.add('open');
  }

  async function saveDetail(skip = false) {
    if (!detailHabitId) return;
    const extra = skip ? {} : {
      duration_minutes: parseInt(document.getElementById('detail-duration').value) || null,
      completed_time: document.getElementById('detail-time').value || null,
      note: document.getElementById('detail-note').value.trim() || null,
    };
    try {
      await toggleHabit(detailHabitId, true, extra);
      closeDetailModal();
      await reload();
    } catch (err) { setNotice(err.message, 'error'); }
  }

  function closeDetailModal() {
    document.getElementById('detail-modal').classList.remove('open');
    detailHabitId = null;
  }

  document.getElementById('detail-save-btn').addEventListener('click', () => saveDetail(false));
  document.getElementById('detail-skip-btn').addEventListener('click', () => saveDetail(true));
  document.getElementById('detail-close-btn').addEventListener('click', closeDetailModal);
  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-modal')) closeDetailModal();
  });

  async function deleteHabit(id) {
    const { data: habit } = await db.from('habits').select('name').eq('id', id).single();
    if (habit) {
      await db.from('habits').delete().eq('date', TEMPLATE_DATE).eq('user_name', currentUser).eq('name', habit.name);
    }
    const { error } = await db.from('habits').delete().eq('id', id);
    if (error) throw error;
  }

  // ─── Render habits ───────────────────────────────────────────────────────
  function renderHabits(habits) {
    list.innerHTML = '';
    if (habits.length === 0) {
      list.innerHTML = `<div class="empty-state"><span>🌱</span>${t('noHabits')}</div>`;
      updateProgress(0, 0);
      return;
    }
    habits.forEach(habit => {
      const item = document.createElement('div');
      item.className = 'habit-item' + (habit.done ? ' done' : '');
      item.dataset.id = habit.id;
      // Build badges for extra info
      let badges = '';
      if (habit.done) {
        if (habit.duration_minutes) badges += `<span class="habit-badge">⏱ ${habit.duration_minutes} min</span>`;
        if (habit.completed_time)   badges += `<span class="habit-badge">🕐 ${habit.completed_time.slice(0,5)}</span>`;
        if (habit.note)             badges += `<span class="habit-badge">📝 ${escapeHtml(habit.note)}</span>`;
      }

      item.innerHTML = `
        <div class="habit-check ${habit.done ? 'checked' : ''}" data-id="${habit.id}" data-done="${habit.done}" data-name="${escapeHtml(habit.name)}" role="checkbox" aria-checked="${habit.done}" tabindex="0">
          <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1 5L4.5 8.5L12 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="habit-name">${escapeHtml(habit.name)}</div>
          ${badges ? `<div class="habit-meta">${badges}</div>` : ''}
        </div>
        <button class="habit-delete" data-id="${habit.id}" title="Remove habit">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>`;
      list.appendChild(item);
    });
    const done = habits.filter(h => h.done).length;
    updateProgress(done, habits.length);
  }

  function updateProgress(done, total) {
    progressText.textContent = `${done} / ${total}`;
    progressBar.style.width = total > 0 ? `${Math.round((done / total) * 100)}%` : '0%';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function reload() {
    try {
      await syncToday();
      const habits = await fetchHabits();
      renderHabits(habits);
      setNotice('Connected to Supabase', 'connected');
    } catch (err) {
      list.innerHTML = `<div class="empty-state"><span>⚠️</span>${t('couldNotLoad')}</div>`;
      setNotice(`Supabase error: ${err.message}`, 'error');
    }
    renderCalendar();
  }

  // ─── Calendar ────────────────────────────────────────────────────────────
  let calYear, calMonth;

  async function renderCalendar() {
    const grid  = document.getElementById('cal-grid');
    const label = document.getElementById('cal-month-label');
    const monthData = await fetchMonthHabits(calYear, calMonth);

    const dayMap = {};
    for (const row of monthData) {
      if (!dayMap[row.date]) dayMap[row.date] = { total: 0, done: 0 };
      dayMap[row.date].total++;
      if (row.done) dayMap[row.date].done++;
    }

    label.textContent = new Date(calYear, calMonth - 1, 1).toLocaleDateString(t('dateLocale'), { month: 'long', year: 'numeric' });
    grid.innerHTML = '';

    t('calDays').forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDow    = new Date(calYear, calMonth - 1, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth, 0).getDate();

    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr  = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isFuture = dateStr > TODAY;
      const isToday  = dateStr === TODAY;
      const info = dayMap[dateStr];

      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (isToday)  cell.classList.add('today');

      if (isFuture) {
        cell.classList.add('future');
      } else if (info) {
        cell.classList.add('has-data');
        const pct = info.total > 0 ? info.done / info.total : 0;
        if (pct === 1)       cell.classList.add('pct-100');
        else if (pct >= 0.5) cell.classList.add('pct-high');
        else if (pct > 0)    cell.classList.add('pct-low');
        else                 cell.classList.add('pct-zero');

        const tip = document.createElement('div');
        tip.className = 'cal-tooltip';
        tip.textContent = `${info.done}/${info.total} habits`;
        cell.appendChild(tip);
      }

      const num = document.createElement('div');
      num.className = 'cal-num';
      num.textContent = d;
      cell.appendChild(num);

      if (!isFuture && info) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot';
        cell.appendChild(dot);
      }

      // Click on a past day with data → open preview
      if (!isFuture && info) {
        cell.addEventListener('click', () => openDayPreview(dateStr));
      }

      grid.appendChild(cell);
    }
  }

  // ─── Day Preview Modal ───────────────────────────────────────────────────
  async function openDayPreview(dateStr) {
    document.getElementById('day-modal').classList.add('open');
    document.getElementById('day-modal-title').textContent = t('dayPreview');
    document.getElementById('day-modal-date').textContent =
      new Date(dateStr + 'T12:00:00').toLocaleDateString(t('dateLocale'), { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const content = document.getElementById('day-modal-content');
    content.innerHTML = `<div class="modal-loading">${t('loading')}</div>`;

    const { data, error } = await db.from('habits').select('*')
      .eq('date', dateStr).eq('user_name', currentUser).order('created_at', { ascending: true });

    if (error || !data) { content.innerHTML = `<p style="color:#e53e3e">${error?.message}</p>`; return; }
    if (data.length === 0) { content.innerHTML = `<div class="empty-state"><span>🌱</span>${t('noHabits')}</div>`; return; }

    content.innerHTML = data.map(h => {
      const badges = [];
      if (h.duration_minutes) badges.push(`⏱ ${h.duration_minutes} min`);
      if (h.completed_time)   badges.push(`🕐 ${h.completed_time.slice(0,5)}`);
      if (h.note)             badges.push(`📝 ${escapeHtml(h.note)}`);
      return `
        <div class="preview-habit">
          <div class="preview-check ${h.done ? 'done' : ''}"></div>
          <div class="preview-habit-info">
            <div class="preview-habit-name ${h.done ? 'done' : ''}">${escapeHtml(h.name)}</div>
            ${badges.length ? `<div class="habit-meta">${badges.map(b => `<span class="habit-badge">${b}</span>`).join('')}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('day-close-btn').addEventListener('click', () =>
    document.getElementById('day-modal').classList.remove('open'));
  document.getElementById('day-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('day-modal'))
      document.getElementById('day-modal').classList.remove('open');
  });

  // ─── Tournament Modal ────────────────────────────────────────────────────
  const USERS_CONFIG = [
    { id: 'me',     label: 'Vlad', avatar: '🧑' },
    { id: 'sister', label: 'Lena', avatar: '👧' },
    { id: 'mother', label: 'Nata', avatar: '👩' },
  ];

  let trnYear, trnMonth;

  async function openTournament() {
    document.getElementById('tournament-modal').classList.add('open');
    const now = new Date();
    trnYear  = now.getFullYear();
    trnMonth = now.getMonth() + 1;
    await renderTournament();
  }

  async function renderTournament() {
    const label = document.getElementById('trn-month-label');
    const content = document.getElementById('tournament-content');
    label.textContent = new Date(trnYear, trnMonth - 1, 1)
      .toLocaleDateString(t('dateLocale'), { month: 'long', year: 'numeric' });
    content.innerHTML = `<div class="modal-loading">${t('loading')}</div>`;

    const from = `${trnYear}-${String(trnMonth).padStart(2,'0')}-01`;
    const lastDay = new Date(trnYear, trnMonth, 0).getDate();
    const to = `${trnYear}-${String(trnMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

    const { data, error } = await db.from('habits').select('user_name, done')
      .gte('date', from).lte('date', to).gt('date', TEMPLATE_DATE);
    if (error) { content.innerHTML = `<p style="color:#e53e3e">${error.message}</p>`; return; }

    // Compute per-user completion %
    const stats = {};
    for (const u of USERS_CONFIG) stats[u.id] = { total: 0, done: 0 };
    for (const row of data) {
      if (!stats[row.user_name]) continue;
      stats[row.user_name].total++;
      if (row.done) stats[row.user_name].done++;
    }

    const ranked = USERS_CONFIG
      .map(u => ({ ...u, pct: stats[u.id].total > 0 ? Math.round(stats[u.id].done / stats[u.id].total * 100) : 0 }))
      .sort((a, b) => b.pct - a.pct);

    // Assign points (handle ties)
    const pointMap = [3, 2, 1];
    let pts = {};
    ranked.forEach((u, i) => {
      // if tied with previous, give same points
      const prevPct = i > 0 ? ranked[i-1].pct : null;
      pts[u.id] = prevPct !== null && u.pct === prevPct ? pts[ranked[i-1].id] : pointMap[i] ?? 1;
    });

    // Podium order: 2nd, 1st, 3rd
    const podiumOrder = [ranked[1], ranked[0], ranked[2]].filter(Boolean);
    const podiumClass = ['second', 'first', 'third'];
    const medals = ['🥈', '🥇', '🥉'];

    const podiumHTML = podiumOrder.map((u, i) => `
      <div class="podium-place ${podiumClass[i]}">
        <div class="podium-avatar">${u.avatar}</div>
        <div class="podium-name">${u.label}</div>
        <div class="podium-pct">${u.pct}%</div>
        <div class="podium-block">${medals[i]}</div>
      </div>`).join('');

    // All-time points (last 6 months)
    const allTimePoints = await computeAllTimePoints();

    const allTimeRows = USERS_CONFIG
      .map(u => ({ ...u, pts: allTimePoints[u.id] || 0 }))
      .sort((a, b) => b.pts - a.pts);

    const rankEmojis = ['🥇','🥈','🥉'];
    const allTimeHTML = allTimeRows.map((u, i) => `
      <div class="points-row">
        <div class="points-rank">${rankEmojis[i] || i+1}</div>
        <div class="points-user">${u.avatar} ${u.label}</div>
        <div class="points-val">${u.pts} pts</div>
      </div>`).join('');

    content.innerHTML = `
      <div class="podium">${podiumHTML}</div>
      <div class="points-table">
        <div class="points-row header">
          <div class="points-rank">#</div>
          <div class="points-user" style="flex:1">${t('allTimePoints')}</div>
          <div class="points-val">Pts</div>
        </div>
        ${allTimeHTML}
      </div>`;
  }

  async function computeAllTimePoints() {
    // Fetch last 6 months of data for all users
    const now = new Date();
    const from6 = new Date(now.getFullYear(), now.getMonth() - 5, 1).toISOString().slice(0,10);
    const to6   = now.toISOString().slice(0,10);

    const { data } = await db.from('habits').select('user_name, date, done')
      .gte('date', from6).lte('date', to6).gt('date', TEMPLATE_DATE);
    if (!data) return {};

    // Group by month → per-user stats
    const monthMap = {};
    for (const row of data) {
      const mo = row.date.slice(0,7); // YYYY-MM
      if (!monthMap[mo]) monthMap[mo] = {};
      for (const u of USERS_CONFIG) if (!monthMap[mo][u.id]) monthMap[mo][u.id] = { total: 0, done: 0 };
      if (monthMap[mo][row.user_name]) {
        monthMap[mo][row.user_name].total++;
        if (row.done) monthMap[mo][row.user_name].done++;
      }
    }

    const totals = {};
    for (const u of USERS_CONFIG) totals[u.id] = 0;

    for (const mo of Object.keys(monthMap)) {
      const ranked = USERS_CONFIG
        .map(u => ({ id: u.id, pct: monthMap[mo][u.id]?.total > 0 ? monthMap[mo][u.id].done / monthMap[mo][u.id].total : 0 }))
        .sort((a, b) => b.pct - a.pct);
      const ptMap = [3, 2, 1];
      ranked.forEach((u, i) => {
        const prev = i > 0 ? ranked[i-1].pct : null;
        const p = prev !== null && u.pct === prev ? (totals[ranked[i-1].id] - totals[ranked[i-1].id]) || ptMap[i] : ptMap[i] ?? 1;
        totals[u.id] += ptMap[i] ?? 1;
      });
    }
    return totals;
  }

  document.getElementById('tournament-btn').addEventListener('click', openTournament);
  document.getElementById('tournament-close-btn').addEventListener('click', () =>
    document.getElementById('tournament-modal').classList.remove('open'));
  document.getElementById('tournament-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('tournament-modal'))
      document.getElementById('tournament-modal').classList.remove('open');
  });
  document.getElementById('trn-prev').addEventListener('click', async () => {
    trnMonth--; if (trnMonth < 1) { trnMonth = 12; trnYear--; } await renderTournament();
  });
  document.getElementById('trn-next').addEventListener('click', async () => {
    trnMonth++; if (trnMonth > 12) { trnMonth = 1; trnYear++; } await renderTournament();
  });

  // ─── Stats Modal ─────────────────────────────────────────────────────────
  let chartLine = null, chartBar = null;

  function dateOffset(days) {
    const d = new Date();
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }

  async function openStats() {
    document.getElementById('stats-modal').classList.add('open');
    const content = document.getElementById('stats-content');
    content.innerHTML = '<div class="modal-loading">Loading stats...</div>';

    // Destroy old charts if any
    if (chartLine) { chartLine.destroy(); chartLine = null; }
    if (chartBar)  { chartBar.destroy();  chartBar  = null; }

    try {
      const from = dateOffset(-89); // 90 days back
      const rows = await fetchRangeHabits(from, TODAY);

      // Build per-day map
      const dayMap = {};
      for (const row of rows) {
        if (!dayMap[row.date]) dayMap[row.date] = { total: 0, done: 0 };
        dayMap[row.date].total++;
        if (row.done) dayMap[row.date].done++;
      }

      // ── Compute summary stats ────────────────────────────────────
      const activeDays = Object.keys(dayMap).sort();

      // Total habits completed all time (use all rows from DB, but we only have 90d)
      const totalDone = rows.filter(r => r.done).length;

      // Average this month
      const thisMonthDays = activeDays.filter(d => d.startsWith(TODAY.slice(0, 7)));
      const thisMonthAvg = thisMonthDays.length > 0
        ? Math.round(thisMonthDays.reduce((s, d) => {
            const { total, done } = dayMap[d];
            return s + (total > 0 ? done / total : 0);
          }, 0) / thisMonthDays.length * 100)
        : 0;

      // Current streak (consecutive days ending on today with >0 done)
      let streak = 0;
      let cur = new Date(TODAY);
      while (true) {
        const ds = cur.toISOString().slice(0, 10);
        const info = dayMap[ds];
        if (info && info.done > 0) {
          streak++;
          cur.setDate(cur.getDate() - 1);
        } else break;
      }

      // Best streak in the 90-day window
      let best = 0, run = 0;
      for (const d of activeDays) {
        if (dayMap[d].done > 0) { run++; best = Math.max(best, run); }
        else run = 0;
      }

      // ── Last 30 days line chart data ─────────────────────────────
      const last30Labels = [];
      const last30Data   = [];
      for (let i = 29; i >= 0; i--) {
        const ds = dateOffset(-i);
        last30Labels.push(ds.slice(5)); // MM-DD
        const info = dayMap[ds];
        last30Data.push(info && info.total > 0 ? Math.round(info.done / info.total * 100) : null);
      }

      // ── Day-of-week averages bar chart ───────────────────────────
      const dowTotals = Array(7).fill(0);
      const dowCounts = Array(7).fill(0);
      for (const d of activeDays) {
        const dow = new Date(d).getDay();
        const { total, done } = dayMap[d];
        if (total > 0) { dowTotals[dow] += done / total; dowCounts[dow]++; }
      }
      const dowAvg = dowTotals.map((t, i) => dowCounts[i] > 0 ? Math.round(t / dowCounts[i] * 100) : 0);

      // ── Render ───────────────────────────────────────────────────
      content.innerHTML = `
        <div class="stat-cards">
          <div class="stat-card green">
            <div class="stat-val">${streak}</div>
            <div class="stat-label">${t('currentStreak')}</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${best}</div>
            <div class="stat-label">${t('bestStreak')}</div>
          </div>
          <div class="stat-card orange">
            <div class="stat-val">${thisMonthAvg}%</div>
            <div class="stat-label">${t('avgMonth')}</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${totalDone}</div>
            <div class="stat-label">${t('habitsDone')}</div>
          </div>
        </div>

        <div class="chart-card">
          <h4>${t('last30')}</h4>
          <div class="chart-wrap"><canvas id="chart-line"></canvas></div>
        </div>

        <div class="chart-card">
          <h4>${t('bestDays')}</h4>
          <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
        </div>
      `;

      // Line chart
      chartLine = new Chart(document.getElementById('chart-line'), {
        type: 'line',
        data: {
          labels: last30Labels,
          datasets: [{
            label: 'Completion %',
            data: last30Data,
            borderColor: '#667eea',
            backgroundColor: 'rgba(102,126,234,0.12)',
            borderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 5,
            tension: 0.35,
            fill: true,
            spanGaps: true,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: '#edf2f7' } },
            x: { ticks: { maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } }
          },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + '%' } } }
        }
      });

      // Bar chart
      const dowColors = dowAvg.map(v => v >= 80 ? '#48bb78' : v >= 50 ? '#f6ad55' : '#fc8181');
      chartBar = new Chart(document.getElementById('chart-bar'), {
        type: 'bar',
        data: {
          labels: t('calDaysFull'),
          datasets: [{
            label: 'Avg %',
            data: dowAvg,
            backgroundColor: dowColors,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: '#edf2f7' } },
            x: { ticks: { font: { size: 12 } }, grid: { display: false } }
          },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + '%' } } }
        }
      });

    } catch (err) {
      content.innerHTML = `<div class="empty-state"><span>⚠️</span>Could not load statistics.<br><small>${err.message}</small></div>`;
    }
  }

  function closeStats() {
    document.getElementById('stats-modal').classList.remove('open');
  }

  document.getElementById('stats-open-btn').addEventListener('click', openStats);
  document.getElementById('stats-close-btn').addEventListener('click', closeStats);
  document.getElementById('stats-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('stats-modal')) closeStats();
  });

  // ─── Events ──────────────────────────────────────────────────────────────
  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('habit-input');
    const name = input.value.trim();
    if (!name) return;
    addBtn.disabled = true;
    try {
      await addHabit(name);
      input.value = '';
      await reload();
    } catch (err) {
      setNotice(`Failed to add habit: ${err.message}`, 'error');
    } finally {
      addBtn.disabled = false;
    }
  });

  list.addEventListener('click', async (e) => {
    const checkEl  = e.target.closest('.habit-check');
    const deleteEl = e.target.closest('.habit-delete');
    if (checkEl) {
      openDetailModal(checkEl.dataset.id, checkEl.dataset.name, checkEl.dataset.done === 'true');
    }
    if (deleteEl) {
      const id = deleteEl.dataset.id;
      try { await deleteHabit(id); await reload(); }
      catch (err) { setNotice(`Failed to delete habit: ${err.message}`, 'error'); }
    }
  });

  list.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      const checkEl = e.target.closest('.habit-check');
      if (checkEl) { e.preventDefault(); checkEl.click(); }
    }
  });

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } renderCalendar();
  });

  // ─── Boot ────────────────────────────────────────────────────────────────
  document.getElementById('today-date').textContent = new Date().toLocaleDateString(t('dateLocale'), {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const _now = new Date();
  calYear  = _now.getFullYear();
  calMonth = _now.getMonth() + 1;

  // Restore active user button from localStorage
  document.querySelectorAll('.user-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.user === currentUser);
  });

  applyLang();

  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    list.innerHTML = `<div class="empty-state"><span>🔧</span>Set your Supabase credentials in index.html to get started.</div>`;
    setNotice('Supabase not configured — see the HTML comments for setup instructions.', 'error');
  } else {
    reload();
  }
</script>
